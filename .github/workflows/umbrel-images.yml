# Builds and publishes the multi-arch (amd64+arm64) images the Umbrel package
# pins. Trigger manually or by pushing an `umbrel-v*` tag; images are tagged
# with the short commit SHA (what umbrel/stable-channels-lsp/docker-compose.yml
# references) plus `latest`.
name: umbrel-images

on:
  workflow_dispatch:
  push:
    tags: ["umbrel-v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: sc-ldk-server
            dockerfile: umbrel/docker/Dockerfile.ldk-server
          - name: sc-lsp
            dockerfile: umbrel/docker/Dockerfile.sc-lsp
          - name: sc-lsp-gui
            dockerfile: umbrel/docker/Dockerfile.lsp-gui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
