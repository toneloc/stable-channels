name: Mobile Build – Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach GitHub Releases on tag push

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'build')
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Debug APK: auto-signed with the debug keystore so it installs directly.
      # (release build type has no signingConfig -> assembleRelease is unsigned.)
      # google-services.json is gitignored/absent in CI, so the Firebase plugin
      # is not applied and FCM push is not wired into this APK.
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Stage APK
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "Found: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/stable-channels-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: stable-channels-android
          path: stable-channels-android.apk
          if-no-files-found: error

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ github.workspace }}/stable-channels-android.apk
          fail_on_unmatched_files: true
