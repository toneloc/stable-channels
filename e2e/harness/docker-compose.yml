# Regtest-in-a-box for the Stable Channels E2E suite.
#
#   bitcoin-core   — regtest chain
#   chain-init     — one-shot: mines the first 101 blocks at boot
#   block-explorer — electrs esplora HTTP API (what the apps + nodes sync against)
#   ldk-server     — LDK backend of the LSP bidaemon (LSPS2 service enabled)
#   sc-lsp         — stable-channels-lsp front daemon (built from this repo)
#   ldk-node       — counterparty wallet + miner + price mock (e2e/harness)
#   lsp-gui        — optional web build of server/lsp-server-gui (profile: gui)
#
# The runner syncs ldk-server's node id into .env, then recreates ldk-node if
# needed so /bootstrap always connects to the live LSP node.

x-log-rotation: &log-rotation
  driver: json-file
  options:
    max-size: "${SC_DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${SC_DOCKER_LOG_MAX_FILE:-3}"

services:
  bitcoin-core:
    container_name: bitcoin-core
    image: bitcoin/bitcoin:27.1
    logging: *log-rotation
    command:
      - -regtest=1
      - -server=1
      - -txindex=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=sc
      - -rpcpassword=sc
      - -fallbackfee=0.0001
      - -blockfilterindex=1
      - -peerblockfilters=1
    ports:
      - "127.0.0.1:18443:18443"   # RPC (regtest) — localhost-only
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin

  # One-shot: regtest starts at height 0 and electrs won't serve its HTTP API
  # until a block exists — mine the first 101 (mature coinbase) at boot.
  chain-init:
    container_name: chain-init
    image: bitcoin/bitcoin:27.1
    logging: *log-rotation
    depends_on: [bitcoin-core]
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc getblockchaininfo; do sleep 1; done
        bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc createwallet miner 2>/dev/null || \
          bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc loadwallet miner 2>/dev/null || true
        ADDR=$$(bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc -rpcwallet=miner getnewaddress)
        HEIGHT=$$(bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc getblockcount)
        if [ "$$HEIGHT" -lt 101 ]; then
          bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc generatetoaddress $$((101 - HEIGHT)) "$$ADDR"
        fi
        echo "chain-init done at height $$(bitcoin-cli -regtest -rpcconnect=bitcoin-core -rpcuser=sc -rpcpassword=sc getblockcount)"

  block-explorer:
    container_name: block-explorer
    image: ghcr.io/vulpemventures/electrs:latest
    logging: *log-rotation
    depends_on: [bitcoin-core]
    restart: unless-stopped
    command:
      - -vvv
      - --network=regtest
      - --daemon-rpc-addr=bitcoin-core:18443
      - --cookie=sc:sc
      - --http-addr=0.0.0.0:3000
      - --electrum-rpc-addr=0.0.0.0:50001
      - --cors=*
      - --jsonrpc-import
    ports:
      - "127.0.0.1:30000:3000"    # esplora HTTP — the apps' chain source
    volumes:
      - electrs-data:/data

  ldk-server:
    container_name: ldk-server
    build:
      context: .
      dockerfile: docker/Dockerfile.ldk-server
      args:
        CARGO_BUILD_JOBS: "${SC_DOCKER_CARGO_JOBS:-1}"
        CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "${SC_DOCKER_CODEGEN_UNITS:-1}"
    logging: *log-rotation
    depends_on: [block-explorer]
    restart: unless-stopped   # retries until electrs serves (post chain-init)
    # Guard wrapper self-heals the LSPS2 persisted-state restart landmine.
    command: ["/usr/local/bin/ldk-server-guard.sh", "/etc/ldk-server/config.toml", "/data/ldk-server"]
    ports:
      - "127.0.0.1:9735:9735"     # lightning p2p — the wallets + harness dial this
      - "127.0.0.1:3536:3536"     # gRPC (sc-lsp uses the docker network; host port for debugging)
    volumes:
      - ./configs/ldk-server.toml:/etc/ldk-server/config.toml:ro
      - ldk-server-data:/data/ldk-server

  sc-lsp:
    container_name: sc-lsp
    build:
      context: ../..            # repo root — builds server/stable-channels-lsp
      dockerfile: e2e/harness/docker/Dockerfile.sc-lsp
      args:
        CARGO_BUILD_JOBS: "${SC_DOCKER_CARGO_JOBS:-1}"
        CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "${SC_DOCKER_CODEGEN_UNITS:-1}"
    logging: *log-rotation
    depends_on: [ldk-server]
    restart: unless-stopped
    environment:
      # E2E: LSP prices from the harness mock instead of the real feeds, so
      # flow 03 can move the price for BOTH sides of the stability dance.
      # Double-gated in src/constants.rs: the harness LSP image is built with
      # the E2E Cargo feature, then SC_E2E=1 activates mock feeds at runtime.
      SC_E2E: "1"
      SC_PRICE_FEED_BASE: http://ldk-node:9737
    command: ["/usr/local/bin/stable-channels-lsp", "/etc/sc-lsp/config.toml"]
    ports:
      - "127.0.0.1:3002:3002"     # SC daemon REST — the wallets hit this
    volumes:
      - ./configs/sc-lsp.toml:/etc/sc-lsp/config.toml:ro
      # sc-lsp reads ldk-server's config for connection defaults.
      - ./configs/ldk-server.toml:/etc/ldk-server/config.toml:ro
      - sc-lsp-data:/data/stable-channels-lsp
      # Read ldk-server's auto-generated tls.crt + api_key.
      - ldk-server-data:/data/ldk-server:ro

  ldk-node:
    container_name: ldk-node
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CARGO_BUILD_JOBS: "${SC_DOCKER_CARGO_JOBS:-1}"
        CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "${SC_DOCKER_CODEGEN_UNITS:-1}"
    logging: *log-rotation
    depends_on: [block-explorer, ldk-server]
    restart: unless-stopped
    environment:
      HARNESS_LISTEN: 0.0.0.0:9737
      DATA_DIR: /data/harness
      ESPLORA_URL: http://block-explorer:3000
      BITCOIND_RPC: http://bitcoin-core:18443
      BITCOIND_RPC_USER: sc
      BITCOIND_RPC_PASS: sc
      P2P_LISTEN: 0.0.0.0:9736
      LSP_NODE_ID: ${LSP_NODE_ID:-}
      LSP_P2P_ADDR: ldk-server:9735
    ports:
      - "127.0.0.1:9737:9737"     # control API — Maestro helpers hit this
      - "127.0.0.1:9736:9736"     # counterparty p2p
    volumes:
      - harness-data:/data/harness
      # Read ldk-server's TLS cert + api_key so /bootstrap can call its gRPC
      # (OnchainReceive) to fund the LSP's JIT wallet.
      - ldk-server-data:/data/ldk-server:ro
      # Read sc-lsp's audit log for /audit-tail (flow assertions).
      - sc-lsp-data:/data/sc-lsp:ro

  # Optional: the LSP operator GUI (server/lsp-server-gui) as a wasm web build,
  # served as a static site. Off by default — enabled via the `gui` compose
  # profile (backend.sh asks, or set E2E_LSP_GUI=1). Open http://127.0.0.1:3003
  # and point the connection screen at the sc-lsp REST API (127.0.0.1:3002).
  lsp-gui:
    container_name: lsp-gui
    profiles: [gui]
    build:
      context: ../..            # repo root — builds server/lsp-server-gui (web)
      dockerfile: e2e/harness/docker/Dockerfile.lsp-gui
      args:
        CARGO_BUILD_JOBS: "${SC_DOCKER_CARGO_JOBS:-1}"
        CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "${SC_DOCKER_CODEGEN_UNITS:-1}"
    logging: *log-rotation
    depends_on: [sc-lsp]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"       # GUI — open this in a browser

volumes:
  bitcoind-data:
  electrs-data:
  ldk-server-data:
  sc-lsp-data:
  harness-data:
