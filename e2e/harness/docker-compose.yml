# Regtest-in-a-box for the Stable Channels E2E suite.
#
#   bitcoind   — regtest chain
#   electrs    — esplora HTTP API (what the apps + nodes sync against)
#   ldk-server — LDK backend of the LSP bidaemon (LSPS2 service enabled)
#   sc-lsp     — stable-channels-lsp front daemon (built from this repo)
#   harness    — counterparty wallet + miner + price mock (e2e/harness)
#
# First boot: see README.md — the LSP node id must be copied into .env
# (LSP_NODE_ID) before the harness can /bootstrap a channel to it.

services:
  bitcoind:
    image: bitcoin/bitcoin:27.1
    command:
      - -regtest=1
      - -server=1
      - -txindex=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=sc
      - -rpcpassword=sc
      - -fallbackfee=0.0001
      - -blockfilterindex=1
      - -peerblockfilters=1
    ports:
      - "18443:18443"   # RPC (regtest)
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin

  # One-shot: regtest starts at height 0 and electrs won't serve its HTTP API
  # until a block exists — mine the first 101 (mature coinbase) at boot.
  chain-init:
    image: bitcoin/bitcoin:27.1
    depends_on: [bitcoind]
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc getblockchaininfo; do sleep 1; done
        bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc createwallet miner 2>/dev/null || \
          bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc loadwallet miner 2>/dev/null || true
        ADDR=$$(bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc -rpcwallet=miner getnewaddress)
        HEIGHT=$$(bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc getblockcount)
        if [ "$$HEIGHT" -lt 101 ]; then
          bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc generatetoaddress $$((101 - HEIGHT)) "$$ADDR"
        fi
        echo "chain-init done at height $$(bitcoin-cli -regtest -rpcconnect=bitcoind -rpcuser=sc -rpcpassword=sc getblockcount)"

  electrs:
    image: ghcr.io/vulpemventures/electrs:latest
    depends_on: [bitcoind]
    restart: unless-stopped
    command:
      - -vvv
      - --network=regtest
      - --daemon-rpc-addr=bitcoind:18443
      - --cookie=sc:sc
      - --http-addr=0.0.0.0:3000
      - --electrum-rpc-addr=0.0.0.0:50001
      - --cors=*
      - --jsonrpc-import
    ports:
      - "30000:3000"    # esplora HTTP — the apps' chain source
    volumes:
      - electrs-data:/data

  ldk-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.ldk-server
    depends_on: [electrs]
    restart: unless-stopped   # retries until electrs serves (post chain-init)
    command: ["/usr/local/bin/ldk-server", "/etc/ldk-server/config.toml"]
    ports:
      - "9735:9735"     # lightning p2p — the wallets + harness dial this
      - "3536:3536"     # gRPC (sc-lsp uses the docker network; host port for debugging)
    volumes:
      - ./configs/ldk-server.toml:/etc/ldk-server/config.toml:ro
      - ldk-server-data:/data/ldk-server

  sc-lsp:
    build:
      context: ../..            # repo root — builds server/stable-channels-lsp
      dockerfile: e2e/harness/docker/Dockerfile.sc-lsp
    depends_on: [ldk-server]
    restart: unless-stopped
    command: ["/usr/local/bin/stable-channels-lsp", "/etc/sc-lsp/config.toml"]
    ports:
      - "3002:3002"     # SC daemon REST — the wallets hit this
    volumes:
      - ./configs/sc-lsp.toml:/etc/sc-lsp/config.toml:ro
      # sc-lsp reads ldk-server's config for connection defaults.
      - ./configs/ldk-server.toml:/etc/ldk-server/config.toml:ro
      - sc-lsp-data:/data/stable-channels-lsp
      # Read ldk-server's auto-generated tls.crt + api_key.
      - ldk-server-data:/data/ldk-server:ro

  harness:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: [electrs, ldk-server]
    restart: unless-stopped
    environment:
      HARNESS_LISTEN: 0.0.0.0:9737
      DATA_DIR: /data/harness
      ESPLORA_URL: http://electrs:3000
      BITCOIND_RPC: http://bitcoind:18443
      BITCOIND_RPC_USER: sc
      BITCOIND_RPC_PASS: sc
      P2P_LISTEN: 0.0.0.0:9736
      LSP_NODE_ID: ${LSP_NODE_ID:-}
      LSP_P2P_ADDR: ldk-server:9735
    ports:
      - "9737:9737"     # control API — Maestro helpers hit this
      - "9736:9736"     # counterparty p2p
    volumes:
      - harness-data:/data/harness

volumes:
  bitcoind-data:
  electrs-data:
  ldk-server-data:
  sc-lsp-data:
  harness-data:
