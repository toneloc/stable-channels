# Serves the lsp-server-gui wasm bundle and reverse-proxies the SC daemon REST.
# The wasm build of sc-rest-client issues RELATIVE requests (/api/<path>) by
# design — the page's origin must proxy them to the daemon. Proxying inside the
# docker network also spares the browser the self-signed-cert dance and CORS.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://sc-lsp:3002/;
        proxy_ssl_verify off;   # sc-lsp's cert is self-signed; traffic stays on the docker network
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
