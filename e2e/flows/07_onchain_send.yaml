# Step 7 — Onchain Send
# "User sends an onchain payment to another app." With a ready channel this
# routes via splice-out (SendScreen.kt: result = "Splice-out initiated").
appId: com.stablechannels.app
tags: [android, ios, send, onchain]
env:
  HARNESS_API: "http://localhost:9737"
  MINE_BLOCKS: "6"
---
- launchApp

- runScript:
    file: helpers/create_address.js

- tapOn: "Send"
- tapOn: "(Lightning invoice or Onchain address|lnbc1\\.\\.\\.)"   # Android label / iOS placeholder
- inputText: ${output.address}

# Onchain input needs an amount
- assertVisible: "(Amount \\(USD\\)|Onchain Address)"   # Android label / iOS chip
- tapOn: "0.00"
- inputText: "5"
# Both platforms label the button "Send", colliding with the sheet title
# -> index 1. hideKeyboard is unreliable on iOS sims (Android-only).
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    text: "Send"
    index: 1

- extendedWaitUntil:
    visible: "Splice-out initiated"
    timeout: 60000
# Android shows a success screen with Done; iOS shows the inline status —
# dismiss the sheet either way.
- tapOn:
    text: "(Done|Cancel)"
    optional: true

- runScript:
    file: helpers/mine_blocks.js
# Swap pending row clears once the splice confirms
- extendedWaitUntil:
    notVisible: "Swap pending.*"
    timeout: 180000
