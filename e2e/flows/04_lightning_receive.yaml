# Step 4 — Lightning Receive
# "User receives a Lightning payment from another app and BTC balance increases."
# Selectors verified against ReceiveScreen.kt.
appId: com.stablechannels.app
tags: [android, ios, receive]
env:
  HARNESS_API: "http://localhost:9737"
---
- launchApp
- extendedWaitUntil:
    visible: "Receive"
    timeout: 30000
- tapOn: "Receive"

- tapOn: "0.00"
- inputText: "10"
- tapOn: "Generate Invoice"

- extendedWaitUntil:
    visible: "Copy"
    timeout: 20000
- copyTextFrom:
    text: "ln.*"
- runScript:
    file: helpers/pay_invoice.js

# ReceiveScreen offers "New Invoice" alongside Copy once generated; payment
# arrival returns the app to a paid state. The BTC (native) balance line on
# Home increasing is the narrative's assertion.
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Receive"
    timeout: 60000
# TODO(assertion): capture Home BTC balance before/after via copyTextFrom and
# compare in a runScript, or assert on the incoming payment row in History.
