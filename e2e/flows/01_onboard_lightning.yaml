# Step 1 — Onboard over Lightning
# "User funds a Stable Channel with a Lightning payment from another app."
# Fresh install -> receive first payment -> JIT channel opens via LSP.
appId: com.stablechannels.app
tags: [android, ios, onboard]
env:
  HARNESS_API: "http://localhost:9737"
---
# NOTE: no clearState here — pm clear would also wipe test_config.json and
# relaunch the app against MAINNET. Fresh state is prepared by ../run.sh
# (pm clear + re-push config) before maestro starts.
- launchApp

# TODO(navigation): if a first-run onboarding screen exists (create-wallet /
# permissions), add its taps here. Record with `maestro studio`.

# Home reachable — Receive pulses when there is no channel yet
- extendedWaitUntil:
    visible: "Receive"
    timeout: 60000
- tapOn: "Receive"

# No channel yet -> JIT notice is shown (ReceiveScreen.kt:167)
- assertVisible: "First payment — a channel will be opened automatically via LSP"

- tapOn: "0.00"       # amount placeholder (USD)
- inputText: "85"     # canonical stable target — matches prod history, under the $100 JIT cap
- tapOn: "Generate Invoice"

- extendedWaitUntil:
    visible: "Copy"
    timeout: 20000
- copyTextFrom:
    text: "ln.*"      # the truncated invoice text element
- runScript:
    file: helpers/pay_invoice.js

# The app auto-dismisses the receive sheet when the payment lands — Cancel
# only needs tapping if we beat the dismissal.
- tapOn:
    text: "Cancel"
    optional: true

# Onboarded: payment banner + trade buttons enabled on Home.
- extendedWaitUntil:
    visible: "Payment received.*"
    timeout: 120000
- assertVisible: "USD → BTC"
