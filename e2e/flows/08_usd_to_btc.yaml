# Step 8 — USD -> BTC
# "User converts USD exposure into BTC."
# Selectors verified against BuyScreen.kt (identical shape to SellScreen).
appId: com.stablechannels.app
tags: [android, ios, trade]
---
- launchApp
- extendedWaitUntil:
    visible: "USD → BTC"
    timeout: 30000
- tapOn: "USD → BTC"

- assertVisible: "(Amount \\(USD\\)|How much USD to convert to BTC\\?)"   # Android / iOS copy
- tapOn: "0.00"
# $20, not $25: the buy is capped at the stable position, and Step 2's $25
# sell nets $24.75 after the trade fee — a $25 buy-back exceeds it.
- inputText: "20"
- tapOn: "Continue"

- assertVisible: "(Confirm Order|Confirm USD → BTC)"
# Confirm button: Android "Confirm Order"; iOS button is labeled "USD → BTC"
# (which also matches the sheet title -> index 1).
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: "Confirm Order"
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "USD → BTC"
          index: 1

- extendedWaitUntil:
    visible: "Order (Confirmed|Pending)"
    timeout: 30000
- tapOn: "Done"
- assertVisible: "BTC → USD"
