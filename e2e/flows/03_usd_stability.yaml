# Step 3 — USD Stability
# "Settlement payments occur."
# The harness moves the mocked price +2%; the app's stability tick (60s
# interval, 120s cooldown, 0.1% AND $0.25 thresholds) must send a settlement
# keysend to the LSP. Asserted SERVER-SIDE via the LSP audit log — the one
# check the demo videos can't make.
#
# Precondition: run right after 02 (stable position ~$24.75; +2% drift =
# ~$0.49, clearing both thresholds). A tiny stable position won't settle.
appId: com.stablechannels.app
tags: [android, ios, stability]
env:
  HARNESS_API: "http://localhost:9737"
  PRICE_USD: "102000"       # +2% over the canonical 100000
---
- launchApp
- extendedWaitUntil:
    visible: "USD → BTC"
    timeout: 30000

# Price up 2%: the user's fixed-sats backing is now worth more than par ->
# the APP owes the LSP a stability payment.
- runScript:
    file: helpers/set_price_and_mark.js

# App must see the new price (feeds refresh every ~5s).
- extendedWaitUntil:
    visible: "\\$102,000.*"
    timeout: 60000

# Wait for the settlement to land on the LSP (polls /audit-tail).
- runScript:
    env:
      SETTLEMENT_AFTER_ISO: ${output.settlementAfterIso}
    file: helpers/assert_settlement.js

# Restore the canonical price so later flows keep round math.
- runScript:
    file: helpers/set_price.js
- extendedWaitUntil:
    visible: "\\$100,000.*"
    timeout: 60000
