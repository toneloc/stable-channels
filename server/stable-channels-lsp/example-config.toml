# Stable Channels LSP daemon example config
#
# Run: cargo run -p stable-channels-lsp -- /path/to/this/file

[node]
# Where the SC daemon's REST API listens. Clients (GUI, iOS, Android) hit this.
rest_service_address = "127.0.0.1:3002"

# Network. Must match the network LDK Server is running on.
network = "regtest"

[storage.disk]
# SC daemon's data directory. Will hold:
#   - tls.crt + tls.key (auto-generated on first start)
#   - <network>/api_key (auto-generated)
#   - audit_log.txt (append-only)
#   - stable_channels.db (sqlite)
dir_path = "./data/stable-channels-lsp"

# TLS for the SC daemon's own REST endpoint (auto-generated self-signed cert).
[tls]
# Extra hostnames/IPs added to the cert's SAN. localhost + 127.0.0.1 are always
# included; add the public address remote clients (GUI/wallets) dial so they pass
# hostname validation. Omit the section entirely for a localhost-only cert.
# hosts = ["13.202.119.2"]

[ldk_server]
# Path to LDK Server's own config.toml. The SC daemon uses LDK Server's config
# helpers to find its TLS cert and api_key.
config_path = "/path/to/ldk-server-config.toml"

# Optional explicit overrides. Each takes priority over what config_path resolves.
# grpc_address = "127.0.0.1:3536"
# cert_path    = "/path/to/ldk-server/tls.crt"
# api_key_path = "/path/to/ldk-server/regtest/api_key"

# Push notifications. All fields optional. If a credentials file is missing
# at startup, that sender is disabled and RegisterPush still works.
[push]
# APNs (iOS)
apns_key_path            = "/path/to/AuthKey.p8"
apns_key_id              = "<10-char Apple key id>"
apns_team_id             = "<10-char Apple team id>"
apns_topic               = "com.stablechannels.app"
apns_environment         = "sandbox"          # "sandbox" or "production"

# FCM (Android)
fcm_service_account_path = "/path/to/firebase-service-account.json"
