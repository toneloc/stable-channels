name: StableChannels
options:
  bundleIdPrefix: com.stablechannels
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ldk-node:
    url: https://github.com/lightningdevkit/ldk-node.git
    exactVersion: "0.7.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"
  CodeScanner:
    url: https://github.com/twostraws/CodeScanner.git
    from: "2.5.0"

targets:
  StableChannels:
    type: application
    platform: iOS
    sources:
      - path: StableChannels
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stablechannels.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: StableChannels/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VJF3VBKXV9
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: ldk-node
        product: LDKNode
      - package: KeychainAccess
      - package: CodeScanner
    info:
      path: StableChannels/Info.plist
      properties:
        CFBundleDisplayName: Stable Channels
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIBackgroundModes:
          - fetch
          - processing
        NSCameraUsageDescription: "Camera is used to scan QR codes for Lightning invoices and Bitcoin addresses."

  StableChannelsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StableChannelsTests
    dependencies:
      - target: StableChannels
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stablechannels.app.tests
